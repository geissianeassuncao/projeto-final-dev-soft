<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Recuperar Senha</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #eef3f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;

}

/* CARD */
.container {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    text-align: center;
}

/* TÍTULO */
h2 {
    color: #005bb5;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
}

/* BOTÃO */
button {
    width: 100%;
    margin-top: 20px;
    background: #005bb5;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #007ae6;
    transform: scale(1.03);
}
</style>
</head>

<body>

<div class="container">
    <h2>Recuperar senha</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.email }}
        <button type="submit">Enviar</button>
    </form>
</div>

</body>
</html>
